name: EDL-Gen Monitoring CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  laravel-tests:
    name: Laravel API Tests (PHP 8.3 + MariaDB)
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: edlgen_test
          MARIADB_ROOT_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=5
    defaults:
      run:
        working-directory: edlgen_api
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, bcmath
          coverage: none
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Run migrations and tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: edlgen_test
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: |
          php artisan migrate --force
          php artisan test

  flutter-build:
    name: Flutter Analyze + Test + Build APK
    runs-on: ubuntu-latest
    needs: laravel-tests
    defaults:
      run:
        working-directory: edlgen_monitoring
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies + Code Generation
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
      - name: Analyze
        run: flutter analyze
      - name: Run unit tests
        run: flutter test
      - name: Build release APK
        run: flutter build apk --release
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: edlgen-monitoring-apk
          path: edlgen_monitoring/build/app/outputs/flutter-apk/app-release.apk
